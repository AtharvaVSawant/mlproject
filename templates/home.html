<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Predictor</title>

    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #444;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.03);
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #333;
            animation: fadeIn 1s ease-in-out;
        }

        .form-group {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎓 Student Performance</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
                <option disabled selected value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="form-group">
            <label>Race/Ethnicity</label>
            <select name="ethnicity" required>
                <option disabled selected value="">Select</option>
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parental Education</label>
            <select name="parental_level_of_education" required>
                <option disabled selected value="">Select</option>
                <option value="associate's degree">Associate</option>
                <option value="bachelor's degree">Bachelor</option>
                <option value="high school">High School</option>
                <option value="master's degree">Master</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lunch</label>
            <select name="lunch" required>
                <option disabled selected value="">Select</option>
                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>
            </select>
        </div>

        <div class="form-group">
            <label>Test Preparation</label>
            <select name="test_preparation_course" required>
                <option disabled selected value="">Select</option>
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="form-group">
            <label>Reading Score</label>
            <input type="number" name="reading_score" min="0" max="100" required>
        </div>

        <div class="form-group">
            <label>Writing Score</label>
            <input type="number" name="writing_score" min="0" max="100" required>
        </div>

        <button type="submit">Predict</button>
    </form>

    {% if results %}
    <div class="result">
        📊 Prediction: {{ results }}
    </div>
    {% endif %}
</div>

</body>
</html>
